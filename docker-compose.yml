version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      TZ: ${TZ}
    volumes: [pg_data:/var/lib/postgresql/data]
    ports:
      - "15432:5432"   # Include this mapping for local debugging
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $PG_USER -d $PG_DB"]
      interval: 5s
      timeout: 3s
      retries: 20


  redis:
    image: redis:7-alpine
    command: ["redis-server","--appendonly","yes"]
    networks: [app]

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASS}
      TZ: ${TZ}
    ports:
      - "15672:15672"         # Management UI (local development only)
    networks: [app]

  minio:
    image: minio/minio:latest
    command: ["server","/data","--console-address",":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      TZ: ${TZ}
    volumes: [minio_data:/data]
    ports:
      - "9001:9001"           # MinIO console (local development only)
    networks: [app]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      (mc ls local/${S3_BUCKET} || mc mb local/${S3_BUCKET}) &&
      mc anonymous set download local/${S3_BUCKET} &&
      echo 'Bucket ${S3_BUCKET} public-read (dev only).'
      "
    networks: [app]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TZ: ${TZ}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      # PostgreSQL
      DATABASE_URL: postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}

      # Redis
      REDIS_URL: redis://redis:6379

      # RabbitMQ
      AMQP_URL: amqp://${MQ_USER}:${MQ_PASS}@rabbitmq:5672

      # MinIO / S3 compatibility
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}

      # Gmail OAuth2
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI}
      GMAIL_SENDER: ${GMAIL_SENDER}
      GMAIL_DEMO_RECIPIENT: ${GMAIL_DEMO_RECIPIENT}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-deepseek-chat}
      DEEPSEEK_POST_DELAY_SECONDS: ${DEEPSEEK_POST_DELAY_SECONDS:-1.0}
      DEEPSEEK_AI_USER_DELAY_SECONDS: ${DEEPSEEK_AI_USER_DELAY_SECONDS:-0.0}
      POST_ANALYTICS_REFRESH_INTERVAL: ${POST_ANALYTICS_REFRESH_INTERVAL:-3600}
    expose: ["8080"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio-init:
        condition: service_started
    networks: [app]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose: ["80"]
    networks: [app]

  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${GATEWAY_PORT}:80"  # http://localhost:8080
    depends_on:
      - frontend
      - backend
      - minio
    networks: [app]

volumes:
  pg_data:
  minio_data:

networks:
  app: { driver: bridge }
